syntax = "proto3";

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

message User {
  string email = 1 [(buf.validate.field).string.email = true];
  google.protobuf.Timestamp birth_date = 2;
  google.protobuf.Timestamp signup_date = 3;

  option (buf.validate.message).cel = {
    id: "user.signup_date"
    message: "signup date must be on or after birth date"
    expression: "this.signup_date >= this.birth_date"
  };
}



service TestService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc CumSum(stream CumSumRequest) returns (CumSumResponse);
}

message CreateUserRequest {
  User user = 1;
}

message CreateUserResponse {
  User user = 1;
}

message CumSumRequest {
  int64 number = 1 [(buf.validate.field).int64.gt = 0];
}

message CumSumResponse {
  // Sum must be positive to enable response validation testing.
  int64 sum = 1 [(buf.validate.field).int64.gt = 0];
}